<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBU口岸事业部 - 组织能力月度看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#f0f2f5;color:#333;line-height:1.6;min-width:900px}
.header{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:16px 32px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.header h1{font-size:20px;font-weight:600}
.month-selector{display:flex;align-items:center;gap:6px}
.month-selector select{padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff;font-size:13px;cursor:pointer;outline:none}
.month-selector select option{color:#333}
.month-nav button{width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.month-nav button:hover{background:rgba(255,255,255,.25)}
.container{max-width:1400px;margin:0 auto;padding:16px}

/* 摘要 */
.summary-cards{background:linear-gradient(135deg,#e8f0fe,#d4e4fc);border-radius:10px;padding:6px;margin-bottom:16px;box-shadow:0 2px 10px rgba(26,35,126,.06)}
.summary-row{display:flex;flex-wrap:wrap;gap:0;align-items:stretch;border-radius:8px;overflow:hidden}
.summary-row+.summary-row{margin-top:6px}
.summary-item{flex:1;min-width:130px;padding:14px 8px 10px;text-align:center;background:#fff;transition:transform .15s}
.summary-item:first-child{border-radius:8px 0 0 8px}
.summary-item:last-child{border-radius:0 8px 8px 0}
.summary-item:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:1}
.summary-item .sl{font-size:11px;color:#999;margin-bottom:4px;font-weight:500}
.summary-item .sv{font-size:26px;font-weight:800;color:#1a237e;letter-spacing:-1px}
.summary-item .sv.o{color:#f59e0b}.summary-item .sv.g{color:#10b981}.summary-item .sv.r{color:#ef4444}
.summary-sep{width:2px;background:linear-gradient(180deg,transparent,#c0d4f0,transparent);flex-shrink:0}
.summary-sub{font-size:10px;color:#bbb;margin-top:1px}

/* 板块 */
.section{background:#fff;border-radius:10px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.04);overflow:hidden}
.section-h{padding:14px 20px;background:#fafafa;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.section-h h2{font-size:15px;color:#1a237e;margin:0}
.section-h .tog{font-size:16px;color:#aaa;transition:.3s;min-width:20px;text-align:center}
.section-h .tog.c{transform:rotate(-90deg)}
.section-b{padding:16px 20px}
.section-b.h{display:none}
.subsec{margin-bottom:18px}
.subsec:last-child{margin-bottom:0}
.subsec-title{font-size:13px;font-weight:600;color:#555;margin-bottom:10px;padding-left:8px;border-left:3px solid #1a237e}

/* 表格 */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th,.tbl td{border:1px solid #e8e8e8;padding:7px 5px;text-align:center}
.tbl th:first-child,.tbl th[rowspan]{text-align:center}
.tbl th{background:#e6f0ff;font-weight:600;color:#1a237e}
.tbl .hdr{background:#e6f0ff;font-weight:600}
.tbl .lb{text-align:center;font-weight:500;background:#fafafa}
.tbl tr:hover td{background:#fafafa}
.tbl .g{color:#10b981;font-weight:600}
.tbl .r{color:#ef4444;font-weight:600}
.tbl .o{color:#f59e0b;font-weight:600}
/* 评估表 */
.atbl{width:100%;border-collapse:collapse;font-size:12px}
.atbl th,.atbl td{border:1px solid #e8e8e8;padding:8px 5px;text-align:center}
.atbl th{background:#f5f7fa;font-weight:600;color:#555}
.atbl .pass{background:#f6ffed;color:#10b981;font-weight:600}
.atbl .fail{background:#fff1f0;color:#ef4444;font-weight:600}
.atbl .dl{text-align:center;font-weight:600;color:#333}

/* 图表 */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.chart-b{gap:12px}
.chart-box{background:#fafafa;border-radius:8px;padding:10px;min-height:320px;width:100%}
.chart-full{grid-column:1/-1}

/* 分析 */
.ana{padding:12px 16px;background:#fffbe6;border-left:4px solid #faad14;border-radius:4px;margin-top:12px;font-size:12px;color:#666;line-height:1.8;white-space:pre-wrap}

/* 折叠成本表 */
.cost-toggle{cursor:pointer;color:#1a237e;font-size:12px;padding:6px 0;display:inline-flex;align-items:center;gap:4px;user-select:none}
.cost-toggle:hover{opacity:.8}
.cost-section{margin-top:8px;display:none}

/* 对比颜色 */
.cup{color:#ef4444;font-weight:600}
.cdn{color:#10b981;font-weight:600}

/* Loading */
.loading{text-align:center;padding:40px;color:#999}
/* Lightbox */
.lb-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9999;justify-content:center;align-items:center}
.lb-overlay.show{display:flex}
.lb-overlay img{max-width:95vw;max-height:95vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5);transition:transform .2s ease;cursor:grab;user-select:none;-webkit-user-drag:none}
.lb-overlay img.grabbing{cursor:grabbing}
.lb-close{position:fixed;top:20px;right:30px;color:#fff;font-size:36px;cursor:pointer;z-index:10000;opacity:.7;transition:.2s}
.lb-close:hover{opacity:1}
.lb-toolbar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10000;display:flex;gap:6px;align-items:center;background:rgba(0,0,0,.55);border-radius:20px;padding:6px 14px}
.lb-toolbar button,.lb-toolbar span{background:none;border:none;color:#fff;font-size:15px;cursor:pointer;padding:4px 10px;border-radius:4px;transition:.2s;line-height:1}
.lb-toolbar button:hover{background:rgba(255,255,255,.2)}
.lb-toolbar span{font-size:12px;opacity:.8;min-width:36px;text-align:center}
.org-preview{cursor:zoom-in;transition:opacity .2s;max-width:100%;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.org-preview:hover{opacity:.85}
/* Tab */
.tb{display:flex;gap:0;border-bottom:2px solid #e8e8e8;margin-bottom:14px}
.tb span{padding:7px 18px;cursor:pointer;font-size:13px;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s}
.tb span:hover{color:#1a237e}
.tb span.on{color:#1a237e;border-bottom-color:#1a237e;font-weight:600}
.tc{display:none}.tc.on{display:block}

@media(max-width:900px){
  .summary-item{min-width:100px;padding:10px 3px}.summary-item .sv{font-size:18px}.summary-item .sl{font-size:10px}
  .chart-grid{grid-template-columns:1fr}
  .header{padding:10px 12px}.header h1{font-size:15px}
}
</style>
</head>

async function init(){
  try{months=EMBED_MONTHS;allData=EMBED_DATA}catch(e){months=['2026-05']}
  if(!months.length){document.getElementById('app').innerHTML='<div class="loading">暂无数据</div>';return}
  for(const m of months){
    if(!allData[m])allData[m]=null;
  }
  currentMonth=months[months.length-1];
  document.getElementById('ms').innerHTML=months.map(m=>{const[y,mo]=m.split('-');return `<option value="${m}" ${m===currentMonth?'selected':''}>${y}年${parseInt(mo)}月</option>`}).join('');
  render(currentMonth);
}

function switchMonth(m){currentMonth=m;document.getElementById('ms').value=m;render(m);scrollTo(0,0)}
function prevMonth(){const i=months.indexOf(currentMonth);if(i>0)switchMonth(months[i-1])}
function nextMonth(){const i=months.indexOf(currentMonth);if(i<months.length-1)switchMonth(months[i+1])}

function fpct(v){return v==null?'-':(v*100).toFixed(1)+'%'}
function fnum(v){return v==null?'-':typeof v==='number'?Math.round(v).toLocaleString():v}
function pc(v){if(v==null)return'';if(v>=.9)return'g';if(v>=.8)return'';if(v>=.6)return'o';return'r'}

  return '▶ 数据分析：与上月对比，'+parts.join('；')+'。请BP重点关注变动较大的部门，确认编制调整原因。';
}

function switchTab(evt,id){
  const t=evt.target,p=t.parentElement;
  p.querySelectorAll('span').forEach(s=>s.classList.remove('on'));
  t.classList.add('on');
  const container=p.parentElement;
  container.querySelectorAll('.tc').forEach(c=>c.classList.remove('on'));
  const target=document.getElementById(id);
  if(target){
    target.classList.add('on');
    setTimeout(()=>{
      target.querySelectorAll('.chart-box').forEach(el=>{
        const i=echarts.getInstanceByDom(el);
        if(i)i.resize();
        else{
          const did=el.id;
          if(did==='chart_fillrate')initFillRateChart(allData[currentMonth]);
          else if(did==='chart_key_fill')initKeyFillChart(allData[currentMonth]);
          else if(did==='chart_key_comp')initKeyCompChart(allData[currentMonth]);
        }
      });
    },200);
  }
}

function addCmpRow(data,prevFn){
  const pd=prevFn();if(!pd)return'';
  let r='<tr style="font-size:11px;background:#fffbe6"><td class="lb">📊 环比变化</td>';
  for(const c of so){
    const sc=subCols(c);
    for(const s of sc){
      let ct=0,pt=0;
      for(const row of data){if(row.label&&row[s]!=null)ct+=Number(row[s])}
      for(const row of pd){if(row.label&&row[s]!=null)pt+=Number(row[s])}
      if(!pt){r+='<td>-</td>';continue}
      const diff=ct-pt;const sign=diff>0?'+':'';
      r+=`<td class="${diff>0?'cup':diff<0?'cdn':''}">${sign}${diff}</td>`;
    }
  }
  return r+'</tr>';
}

function renderEstabTable(d,prevD){
  const data=d.establishment;const l3=data.level3_headers;
  const prev=prevD?prevD.establishment:null;
  const prevRows=prev?prev.data:null;
  let h1='<tr><th rowspan="2" style="width:80px">分类</th>';
  let h2='<tr>';
  for(const c of so){const sc=subCols(c);h1+=`<th colspan="${sc.length}" class="hdr">${dn[c]}</th>`;for(const s of sc)h2+=`<th style="font-size:10px">${l3[s]||dl[s]}</th>`}
  h1+='</tr>';h2+='</tr>';
  let r='';
  for(const row of data.data){
    if(!row.label)continue;
    // Find matching prev row (first by label match, then by type)
    let prow=null;
    if(prevRows){for(const p of prevRows){if(p.label===row.label&&p.type===row.type){prow=p;break}}}
    r+='<tr><td class="lb">'+row.label+'</td>';
    for(const c of so){const sc=subCols(c);for(const s of sc){
      const v=row[s];const pv=prow?prow[s]:null;
      if(v==null){r+='<td>-</td>';continue}
      // Compare with prev month for color
      let cls='';
      if(pv!=null&&v!==pv){
        cls=v>pv?' style="background:#d4edda"'  // 绿色：本月 > 上月
               :' style="background:#fff3cd"';   // 浅黄：本月 < 上月
      }
      r+=`<td${cls}>${fnum(v)}</td>`;
    }}
    r+='</tr>';
  }
  return `<table class="tbl"><thead>${h1}${h2}</thead><tbody>${r}</tbody></table>`;
}

function renderKeyPosTable(d){
  const data=d.key_position;const l3=data.level3_headers,l2=data.level2_headers;
  let h='<table class="tbl"><thead><tr><th rowspan="2">指标</th>';
  for(const c of so){const sc=subCols(c);h+=`<th colspan="${sc.length}" class="hdr">${l2[c]||dn[c]}</th>`}
  h+='</tr><tr>';
  for(const c of so){const sc=subCols(c);for(const s of sc)h+=`<th style="font-size:10px">${l3[s]||dl[s]}</th>`}
  h+='</tr></thead><tbody>';
  // Track 合计 index for 满编率 and 胜任率
  let totalCount=0;
  for(const row of data.data){
    let label=row.label;
    const sub=row.sub_label||'';
    const isTotal=sub==='合计';
    if(isTotal){
      totalCount++;
      // First 合计 → 关键岗位满编率, second 合计 → 核心人员胜任率
      label=totalCount===1?'关键岗位满编率（合计）':'核心人员胜任率（合计）';
    }else if(sub){
      label+=' ('+sub+')';
    }
    if(!label&&!isTotal)label=sub;
    h+='<tr'+(isTotal?' style="font-weight:700;background:#f5f7fa"':'')+'><td class="lb">'+label+'</td>';
    for(const c of so){const sc=subCols(c);
      if(isTotal){
        // 合计行：二级部门维度，合并子列
        const v=row[c];
        h+=v!=null?`<td colspan="${sc.length}" class="${pc(v)}">${fpct(v)}</td>`:`<td colspan="${sc.length}">-</td>`;
      }else{
        // 小计行：不进行颜色标注，仅显示百分比数值
        for(const s of sc){
          const v=row[s];
          if(v==null){h+='<td>-</td>';continue}
          h+=(label||'').includes('率')?`<td>${fpct(v)}</td>`:`<td>${fnum(v)}</td>`;
        }
      }
    }
    h+='</tr>';
  }
  return h+'</tbody></table>';
}

function renderRetention(d){
  const data=d.retention;if(!data||!data.data)return'<p>暂无</p>';
  // 双层表头
  let h='<table class="tbl"><thead>';
  h+='<tr><th rowspan="2">指标</th>';
  for(const c of so){const sc=subCols(c);h+=`<th colspan="${sc.length}" class="hdr">${dn[c]}</th>`}
  h+='</tr><tr>';
  for(const c of so){const sc=subCols(c);for(const s of sc)h+=`<th style="font-size:10px">${dl[s]}</th>`}
  h+='</tr></thead><tbody>';

  // 目标/在职/离职
  let retainedBySec={}; // 留任人才数量按二级部门汇总
  for(const row of data.data){
    if(row.label.includes('保留率'))continue;
    const isTarget=row.label.includes('目标');
    h+='<tr><td class="lb">'+row.label+'</td>';
    for(const c of so){const sc=subCols(c);
      if(isTarget){
        const v=row[c];
        h+=v!=null?`<td colspan="${sc.length}">${fnum(v)}</td>`:`<td colspan="${sc.length}">-</td>`;
      }else{
        // 在职/离职：展开到三级，同时累加在职人数
        for(const s of sc){
          const v=row[s];h+='<td>'+(v!=null?fnum(v):'-')+'</td>';
          if(row.label.includes('在职'))retainedBySec[c]=(retainedBySec[c]||0)+(Number(row[s])||0);
        }
      }
    }
    h+='</tr>';
  }

  // 留任人才数量行（合并二级部门）
  h+='<tr style="font-weight:700;background:#f5f7fa"><td class="lb">留任人才数量</td>';
  for(const c of so){const sc=subCols(c);
    const v=retainedBySec[c]||0;
    let cls='',display='';
    for(const row of data.data){
      if(row.label.includes('目标')){
        const tgt=Number(row[c])||0;
        const diff=tgt-v;
        if(v>0&&tgt>0&&diff>0){
          cls='r';
          display=fnum(v)+'<br><span style="font-size:10px;color:#ef4444">-'+diff+'</span>';
        }else{
          cls='g';
          display=fnum(v);
        }
        break;
      }
    }
    h+=v?`<td colspan="${sc.length}" class="${cls}">${display}</td>`:`<td colspan="${sc.length}">-</td>`;
  }
  h+='</tr>';

  h+='</tbody></table>';
  h+='<div class="chart-box chart-full" id="chart_retention" style="height:380px;margin-top:12px"></div>';
  if(data.analysis)h+=`<div class="ana">▶ ${data.analysis}</div>`;
  return h;
}

// ── 图表 ──
function initCharts(d){
  // 优秀人才留任对比
  const re=document.getElementById('chart_retention');
  if(re&&d.retention&&d.retention.data){
    const c=echarts.init(re);
    // 提取目标留任人才数量和留任人才数量（在职汇总）按二级部门
    const targets=[], retained=[];
    for(const x of so){
      // 目标值从"目标留任人才数量"行取
      let tgt=0;
      for(const row of d.retention.data){if(row.label&&row.label.includes('目标')){tgt=Number(row[x])||0;break}}
      targets.push(tgt);
      // 留任值从"在职"行汇总三级部门
      let ret=0;
      for(const row of d.retention.data){if(row.label&&row.label.includes('在职')){for(const s of subCols(x))ret+=Number(row[s])||0;break}}
      retained.push(ret);
    }
    c.setOption({title:{text:'优秀人才保留数量',left:'center',textStyle:{fontSize:13}},tooltip:{trigger:'axis'},legend:{data:['目标留任','实际留任'],bottom:0},xAxis:{type:'category',data:so.map(x=>dn[x]),axisLabel:{rotate:30,fontSize:10}},yAxis:{type:'value'},grid:{bottom:70},series:[
      {name:'目标留任',type:'bar',data:targets,itemStyle:{color:'#b0c4de'},barGap:'10%'},
      {name:'实际留任',type:'bar',data:retained,itemStyle:{color:function(p){return p.value>=targets[p.dataIndex]?'#10b981':'#ef4444'}}}
    ]});
  }
}

function initFillRateChart(d){
  const fe=document.getElementById('chart_fillrate');if(!fe)return;
  const c=echarts.init(fe);const fr=[];
  for(const row of d.fill_rate.data){if(row.label&&row.label.includes('满编率')){for(const x of ac)fr.push(row[x]!=null?Number((row[x]*100).toFixed(1)):0);break}}
  c.setOption({title:{text:'各部门满编率',left:'center',textStyle:{fontSize:13}},tooltip:{trigger:'axis',formatter:p=>p[0].name+'<br/>满编率: <b>'+p[0].value+'%</b>'},xAxis:{type:'category',data:ac.map(x=>dl[x]),axisLabel:{rotate:30,fontSize:10}},yAxis:{type:'value',max:100,axisLabel:{formatter:'{value}%'}},grid:{bottom:70},series:[{type:'bar',data:fr,itemStyle:{color:function(p){return p.value>=90?'#10b981':p.value>=80?'#1890ff':p.value>=60?'#f59e0b':'#ef4444'}}}]});
}
function initKeyFillChart(d){
  const kfe=document.getElementById('chart_key_fill');if(!kfe)return;
  const c=echarts.init(kfe);const kr=[];
  // 使用合计数据（二级部门维度），按出现顺序区分满编率合计和胜任率合计
  let totalIdx=0;
  for(const row of d.key_position.data){
    if(row.sub_label&&row.sub_label.includes('合计')){totalIdx++;
      if(totalIdx===1){for(const x of so)kr.push(row[x]!=null?Number((row[x]*100).toFixed(1)):0);break}
    }
  }
  c.setOption({title:{text:'关键岗位满编率',left:'center',textStyle:{fontSize:13}},tooltip:{trigger:'axis'},xAxis:{type:'category',data:so.map(x=>dn[x]),axisLabel:{rotate:30,fontSize:10}},yAxis:{type:'value',max:100,axisLabel:{formatter:'{value}%'}},grid:{bottom:70},series:[{type:'bar',data:kr,itemStyle:{color:function(p){return p.value>=90?'#10b981':p.value>=80?'#1890ff':p.value>=60?'#f59e0b':'#ef4444'}}}]});
}
function initKeyCompChart(d){
  const kce=document.getElementById('chart_key_comp');if(!kce)return;
  const c=echarts.init(kce);const cr=[];
  let totalIdx=0;
  for(const row of d.key_position.data){
    if(row.sub_label&&row.sub_label.includes('合计')){totalIdx++;
      if(totalIdx===2){for(const x of so)cr.push(row[x]!=null?Number((row[x]*100).toFixed(1)):0);break}
    }
  }
  c.setOption({title:{text:'核心人员胜任率',left:'center',textStyle:{fontSize:13}},tooltip:{trigger:'axis'},xAxis:{type:'category',data:so.map(x=>dn[x]),axisLabel:{rotate:30,fontSize:10}},yAxis:{type:'value',max:100,axisLabel:{formatter:'{value}%'}},grid:{bottom:70},series:[{type:'bar',data:cr,itemStyle:{color:function(p){return p.value>=90?'#10b981':p.value>=80?'#1890ff':p.value>=60?'#f59e0b':'#ef4444'}}}]});
}

window.addEventListener('resize',()=>{document.querySelectorAll('.chart-box').forEach(el=>{const i=echarts.getInstanceByDom(el);if(i)i.resize()})});

// ── Lightbox with zoom & pan ──
let lbScale=1,lbMinScale=.3,lbMaxScale=5,lbPanX=0,lbPanY=0,lbDragging=false,lbStartX=0,lbStartY=0,lbLastPanX=0,lbLastPanY=0;

function previewImage(el){
  const img=document.getElementById('lightboxImg');img.src=el.src;img.style.transform='';
  lbScale=1;lbPanX=0;lbPanY=0;updateZoomLabel();
  document.getElementById('lightbox').classList.add('show');
  setTimeout(fitImage,200);
}

function closePreview(){document.getElementById('lightbox').classList.remove('show')}

function fitImage(){
  const img=document.getElementById('lightboxImg');if(!img.naturalWidth)return;
  const vw=window.innerWidth*.92,vh=window.innerHeight*.88;
  const s=Math.min(vw/img.naturalWidth,vh/img.naturalHeight,1);
  lbScale=s;lbPanX=0;lbPanY=0;applyTransform();updateZoomLabel();
}

function applyTransform(){document.getElementById('lightboxImg').style.transform=`translate(${lbPanX}px,${lbPanY}px) scale(${lbScale})`}
function updateZoomLabel(){const el=document.getElementById('zoomPct');if(el)el.textContent=Math.round(lbScale*100)+'%'}

function zoomIn(){lbScale=Math.min(lbScale*1.4,lbMaxScale);applyTransform();updateZoomLabel()}
function zoomOut(){lbScale=Math.max(lbScale/1.4,lbMinScale);applyTransform();updateZoomLabel()}
function zoomReset(){lbScale=1;lbPanX=0;lbPanY=0;applyTransform();updateZoomLabel()}
function zoomFit(){fitImage()}

// mouse wheel zoom
document.getElementById('lightbox').addEventListener('wheel',function(e){
  e.preventDefault();const d=e.deltaY<0?1.1:0.9;lbScale=Math.min(lbMaxScale,Math.max(lbMinScale,lbScale*d));
  applyTransform();updateZoomLabel();
},{passive:false});

// drag to pan
(function(){
  const img=document.getElementById('lightboxImg');
  img.addEventListener('mousedown',function(e){
    e.preventDefault();lbDragging=true;img.classList.add('grabbing');
    lbStartX=e.clientX-lbPanX;lbStartY=e.clientY-lbPanY;
  });
  window.addEventListener('mousemove',function(e){
    if(!lbDragging)return;lbPanX=e.clientX-lbStartX;lbPanY=e.clientY-lbStartY;applyTransform();
  });
  window.addEventListener('mouseup',function(){
    if(lbDragging){lbDragging=false;img.classList.remove('grabbing')}
  });
})();

// double-click to toggle between fit and 100%
document.getElementById('lightboxImg').addEventListener('dblclick',function(e){
  e.stopPropagation();
  if(lbScale<.99){zoomReset()}else{fitImage()}
});

// keyboard controls
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lightbox').classList.contains('show'))return;
  if(e.key==='Escape')closePreview();
  if(e.key==='+'||e.key==='='){e.preventDefault();zoomIn()}
  if(e.key==='-'){e.preventDefault();zoomOut()}
  if(e.key==='0'){e.preventDefault();zoomReset()}
});

init();
</script>
